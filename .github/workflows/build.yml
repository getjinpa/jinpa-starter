name: Deploy Jinpa site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure site URL and basePath
        run: |
          node -e "
            const fs = require('fs');
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const config = JSON.parse(fs.readFileSync('site.config.json', 'utf-8'));

            // Only auto-configure if still using placeholder defaults
            if (config.site.url === 'https://username.github.io') {
              config.site.url = 'https://' + owner + '.github.io';
              // Project repos are served at /repo-name/, org pages are at root
              if (repo !== owner + '.github.io') {
                config.site.basePath = '/' + repo + '/';
              }
              fs.writeFileSync('site.config.json', JSON.stringify(config, null, 2));
              console.log('Auto-configured: url=' + config.site.url + ' basePath=' + config.site.basePath);
            } else {
              console.log('site.config.json already configured, skipping auto-detection.');
            }
          "

      - name: Build site
        run: npm run build

      - name: Build search index
        run: npx -y pagefind --site dist

      - name: Inject Built with Jinpa badge
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            // Check for valid license key
            const config = JSON.parse(fs.readFileSync('site.config.json', 'utf-8'));
            const key = (config.jinpaKey || '').trim();
            const validKey = /^JNP-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key);

            if (validKey) {
              console.log('Valid Jinpa license key found — badge skipped.');
              process.exit(0);
            }

            console.log('No license key — injecting Built with Jinpa badge.');

            const badge = \`
            <a href=\"https://getjinpa.com\" target=\"_blank\" rel=\"noopener noreferrer\"
               id=\"jinpa-badge\"
               style=\"position:fixed;bottom:1rem;right:1rem;z-index:9999;display:inline-flex;align-items:center;gap:0.375rem;padding:0.375rem 0.75rem;background:#1e40af;color:#fff;font-family:system-ui,sans-serif;font-size:0.75rem;font-weight:600;text-decoration:none;border-radius:9999px;box-shadow:0 2px 8px rgba(0,0,0,0.25);opacity:0.9;transition:opacity 0.2s\"
               onmouseover=\"this.style.opacity='1'\" onmouseout=\"this.style.opacity='0.9'\">
              <svg width=\"12\" height=\"12\" viewBox=\"0 0 32 32\" fill=\"none\" aria-hidden=\"true\"><rect width=\"32\" height=\"32\" rx=\"8\" fill=\"#3b82f6\"/><path d=\"M10 22V16C10 13.8 11.8 12 14 12H18C20.2 12 22 13.8 22 16V22\" stroke=\"white\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><circle cx=\"16\" cy=\"9\" r=\"2\" fill=\"white\"/></svg>
              Built with Jinpa
            </a>\`;

            function walk(dir) {
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walk(full);
                else if (entry.name.endsWith('.html')) {
                  const html = fs.readFileSync(full, 'utf-8');
                  if (!html.includes('id=\"jinpa-badge\"')) {
                    fs.writeFileSync(full, html.replace('</body>', badge + '\n</body>'));
                  }
                }
              }
            }

            walk('./dist');
            console.log('Badge injected into all HTML files.');
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
