<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <title>Reading Progress</title>
  <!-- Background rounded rectangle -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <!-- Progress bar track -->
  <rect x="8" y="20" width="32" height="8" rx="4" fill="#DBEAFE"/>
  <!-- Progress bar fill -->
  <rect x="8" y="20" width="22" height="8" rx="4" fill="#2563EB"/>
  <!-- Small text lines to suggest reading content -->
  <rect x="8" y="33" width="24" height="2" rx="1" fill="#93C5FD"/>
  <rect x="8" y="38" width="18" height="2" rx="1" fill="#93C5FD"/>
  <!-- Scroll indicator arrow -->
  <path d="M38 33 L40 36 L42 33" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M40 36 L40 30" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Top decorative dots -->
  <circle cx="12" cy="12" r="2" fill="#2563EB"/>
  <circle cx="18" cy="12" r="2" fill="#60A5FA"/>
  <circle cx="24" cy="12" r="2" fill="#BFDBFE"/>
</svg>
