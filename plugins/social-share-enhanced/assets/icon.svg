<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <title>Social Share Enhanced</title>
  <!-- Background rounded rectangle -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#F0FDF4" stroke="#10B981" stroke-width="2"/>
  <!-- Share network nodes -->
  <circle cx="14" cy="24" r="4" fill="#10B981"/>
  <circle cx="34" cy="14" r="3.5" fill="#6EE7B7"/>
  <circle cx="34" cy="34" r="3.5" fill="#6EE7B7"/>
  <!-- Connection lines -->
  <line x1="17.5" y1="22" x2="31" y2="15" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <line x1="17.5" y1="26" x2="31" y2="33" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <!-- Small platform dots -->
  <circle cx="34" cy="14" r="1.5" fill="#059669"/>
  <circle cx="34" cy="34" r="1.5" fill="#059669"/>
  <circle cx="14" cy="24" r="2" fill="#047857"/>
</svg>
